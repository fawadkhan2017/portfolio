    <style type="text/tailwindcss">
    @layer theme {
        :root {
            --primary-color: #10b981; /* Fiverr Green */
            --primary-hover: #059669;
            --bg-light: #f9fafb;
            --text-main: #111827;
            --text-muted: #6b7280;
        }
    }

    @layer base {
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-light);
            color: var(--text-main);
        }
    }

    @layer components {
        .btn-primary {
            @apply inline-flex items-center justify-center px-6 py-3 border border-transparent text-base font-medium rounded-md text-white transition-colors duration-200;
            background-color: var(--primary-color);
        }
        .btn-primary:hover {
            background-color: var(--primary-hover);
        }
        .btn-secondary {
            @apply inline-flex items-center justify-center px-6 py-3 border border-gray-300 text-base font-medium rounded-md text-gray-700 bg-white hover:bg-gray-50 transition-colors duration-200;
        }
        .section-title {
            @apply text-3xl md:text-4xl font-bold text-center mb-12;
        }
    }
    </style>
</head>
