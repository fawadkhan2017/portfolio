    <style type="text/tailwindcss">
    @layer theme {
        :root {
            --primary: #1dbf73; /* Fiverr Green */
            --primary-hover: #19a463;
            --bg-dark: #0f172a;
            --bg-card: #1e293b;

            --text-muted: #94a3b8;
        }
    }

    @layer base {
        body {
            font-family: 'Inter', sans-serif;
            @apply bg-[var(--bg-dark)] text-[var(--text-main)] antialiased;
        }
    }

    @layer components {
        .btn-primary {
            @apply bg-[var(--primary)] hover:bg-[var(--primary-hover)] text-white font-medium py-3 px-6 rounded-lg transition-colors duration-300 inline-flex items-center gap-2;
        }
        .btn-outline {

        }
        .section-padding {
            @apply py-20 px-6 md:px-12 lg:px-24 max-w-7xl mx-auto;
        }
        .section-title {
            @apply text-3xl md:text-4xl font-bold mb-4 text-center;
        }
        .section-subtitle {
            @apply text-[var(--text-muted)] text-center max-w-2xl mx-auto mb-12;
        }
    }
    </style>
